services:
  nginx:
    image: nginx:alpine
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}
      NGINX_PORT: ${NGINX_PORT:-80}
      TZ: ${TZ:-UTC}
    ports:
      - "${HOST_PORT:-80}:${NGINX_PORT:-80}"
    command:
      - /bin/sh
      - -c
      - |
        printf 'server {\n    listen %s;\n    server_name %s;\n\n    location / {\n        root /usr/share/nginx/html;\n        index index.html;\n    }\n}\n' "$${NGINX_PORT}" "$${SERVER_NAME}" > /etc/nginx/conf.d/default.conf
        printf '<h1>Hello from %s (Port: %s, TZ: %s)</h1>\n' "$${SERVER_NAME}" "$${NGINX_PORT}" "$${TZ}" > /usr/share/nginx/html/index.html
        exec nginx -g 'daemon off;'
    restart: unless-stopped